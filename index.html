<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>달리기 게임</title>

<style>
body { text-align:center; background:#111; color:white; font-family:Arial; }
canvas { background:#333; border-radius:10px; margin-top:20px; }

button {
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#00c853;
  color:white;
  cursor:pointer;
}

.admin { display:none; background:#222; padding:10px; margin-top:10px; }

input {
  width:40px;
  text-align:center;
  margin-top:5px;
}
</style>
</head>

<body>

<h1>🏃 달리기 게임</h1>

<button onclick="startRace()">출발</button>
<button onclick="loginAdmin()">👑 관리자</button>

<canvas id="game" width="800" height="400"></canvas>

<h2 id="result"></h2>

<div class="admin" id="adminPanel">
  <h3>관리자 모드</h3>
  <div id="rankInputs"></div>
  <br>
  <button onclick="applyFixed()">순위 지정 적용</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let players = [];
let names = ["1번","2번","3번","4번","5번"];
let finishOrder = [];
let running = false;

let useFixed = false;
let fixedRanks = [];

// 기본 이름
function resetNames(){
  names = ["1번","2번","3번","4번","5번"];
}

// 관리자 이름
function setAdminNames(){
  names = ["한이","바가","라면 진지","진상","제갈","조교"];
}

// 플레이어 생성
function createPlayers(){
  players = [];
  for(let i=0;i<names.length;i++){
    players.push({ x:0, y:60+i*50, speed:0, rank:0 });
  }
}

// 그리기
function draw(){
  ctx.clearRect(0,0,800,400);

  ctx.fillStyle="white";
  ctx.fillRect(750,0,5,400);

  players.forEach((p,i)=>{
    ctx.fillStyle="white";
    ctx.fillText(names[i], p.x, p.y);
    ctx.fillRect(p.x, p.y+5, 30, 5); // 간단한 막대
  });
}

// 업데이트
function update(){
  if(!running) return;

  players.forEach((p,i)=>{
    let speed;

    if(useFixed){
      const targetRank = fixedRanks[i];
      speed = (players.length - targetRank) * 0.6 + Math.random();
    } else {
      speed = Math.random()*4;
    }

    p.x += speed;
  });

  checkFinish();
  draw();
  requestAnimationFrame(update);
}

// 도착 체크
function checkFinish(){
  players.forEach((p,i)=>{
    if(p.x>=750 && p.rank===0){
      p.rank = finishOrder.length+1;
      finishOrder.push(i);
    }
  });

  if(finishOrder.length===players.length){
    running=false;
    showResult();
  }
}

// 결과
function showResult(){
  let txt="🏆 결과\n";
  finishOrder.forEach((idx,i)=>{
    if(i<3){
      txt += `${i+1}등: ${names[idx]}\n`;
    }
  });

  document.getElementById("result").innerText = txt;

  useFixed = false; // 1회용
}

// 시작
function startRace(){
  finishOrder = [];

  if(useFixed){
    setAdminNames();
  } else {
    resetNames();
  }

  createPlayers();
  running = true;
  update();
}

// 관리자 로그인
function loginAdmin(){
  if(prompt("비밀번호") === "1234"){
    document.getElementById("adminPanel").style.display="block";
    setAdminNames();
    renderInputs();
  }
}

// 순위 입력 UI
function renderInputs(){
  const box = document.getElementById("rankInputs");
  box.innerHTML = "";

  names.forEach((n,i)=>{
    box.innerHTML += `
      <div>
        ${n}<br>
        <input id="r${i}" placeholder="순위">
      </div>
    `;
  });
}

// 순위 적용
function applyFixed(){
  fixedRanks = [];

  for(let i=0;i<names.length;i++){
    const val = parseInt(document.getElementById("r"+i).value);
    if(!val){
      alert("순위 전부 입력해야 함!");
      return;
    }
    fixedRanks.push(val);
  }

  useFixed = true;
  alert("다음 판에 적용됨!");
}

// 초기 화면
draw();
</script>

</body>
</html>
