<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>룰렛 레이스</title>

<style>
@font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Medium.woff2') format('woff2');
    font-weight: 500;
    font-display: swap;
}

body {
    font-family: 'Pretendard', Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#fff;
    text-align:center;
}

.glass {
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.1);
    border-radius:16px;
    padding:15px;
    margin:10px auto;
    width:90%;
}

button, input {
    padding:10px;
    font-size:16px;
    margin:10px;
    border-radius:10px;
    border:none;
    cursor:pointer;
}

.hidden { display:none; }

.track {
    margin:4px 0;
    background: rgba(255,255,255,0.1);
    border-radius:10px;
    overflow:hidden;
}

.runner {
    height:18px;
    line-height:18px;
    padding-left:8px;
    border-radius:10px;
    background: linear-gradient(90deg,#00c6ff,#0072ff);
    width:0%;
    transition: width 0.08s linear;
    font-size:12px;
}

.cards {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
}

.card {
    width:140px;
    padding:12px;
    border-radius:14px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    display:flex;
    flex-direction:column;
    align-items:center;
    transition: transform 0.3s;
}

.card:hover {
    transform: translateY(-5px) scale(1.03);
}

.stack {
    width:100%;
    display:flex;
    flex-direction:column-reverse;
    gap:1px;
    height:70px;
    margin-top:6px;
}

.block {
    height:3px;
    border-radius:2px;
    background: linear-gradient(90deg,#00f260,#0575e6);
    animation: stackUp 0.25s ease;
}

@keyframes stackUp {
    from { transform: translateY(10px); opacity:0; }
    to { transform: translateY(0); opacity:1; }
}

.top1 { transform: scale(1.25); background: gold; color:#000; }
.top2 { transform: scale(1.1); background: silver; color:#000; }
.top3 { transform: scale(1.05); background: #cd7f32; color:#000; }

@keyframes popText {
  0% { transform: scale(0.5); opacity:0; }
  50% { transform: scale(1.2); opacity:1; }
  100% { transform: scale(1); }
}

.firework {
  position:absolute;
  width:6px;
  height:6px;
  border-radius:50%;
  background: gold;
  animation: explode 0.8s ease-out forwards;
}

@keyframes explode {
  from { transform: translate(0,0); opacity:1; }
  to { transform: translate(var(--x), var(--y)); opacity:0; }
}
</style>
</head>

<body>

<h1>🏁 룰렛 레이스</h1>

<div id="startScreen" class="glass">
  <input type="number" id="roundInput" value="1000" min="1" max="1000">
  <button onclick="startRace()">시작</button>

  <br>
  <a href="https://wheelofnames.com/ko/ggq-yvj" target="_blank">
    <button>돌림판</button>
  </a>
</div>
     <br>
  <a href="https://lazygyu.github.io/roulette/" target="_blank">
    <button>마블룰렛</button>
  </a>
</div>

<div id="tracks" class="glass hidden"></div>

<div id="resultSection" class="hidden">
  <h2 id="finalTitle">📊 진행 중...</h2>
  <div id="result" class="glass"></div>
  <button id="retryBtn" class="hidden" onclick="goHome()">🔄 다시 하기</button>
</div>

<div id="celebration" class="hidden" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:bold;z-index:999;">
  <div id="celebrationText"></div>
</div>

<script>
const players = ["한이","바가","라면","진상","진지","조교","제갈태윤"];
let winCount = {};
players.forEach(p => winCount[p]=0);

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

function createTracks(){
  const tracks = document.getElementById("tracks");
  tracks.innerHTML = "";

  players.forEach(p=>{
    const t = document.createElement("div");
    t.className = "track";

    const r = document.createElement("div");
    r.className = "runner";
    r.id = "runner_"+p;
    r.innerText = p;

    t.appendChild(r);
    tracks.appendChild(t);
  });
}

async function runAnimatedRace(){
  createTracks();

  let progress = {};
  players.forEach(p=>progress[p]=0);

  let finished = false;
  let winner = null;

  while(!finished){
    for(let p of players){
      progress[p] += Math.random()*15;
      if(progress[p] >= 100 && !finished){
        finished = true;
        winner = p;
      }
      document.getElementById("runner_"+p).style.width = Math.min(progress[p],100)+"%";
    }
    await sleep(10);
  }

  return winner;
}

function runFastRace(){
  return players[Math.floor(Math.random()*players.length)];
}

async function startRace(){
  document.getElementById("celebration").classList.add("hidden");
  document.getElementById("celebrationText").innerText = "";
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("tracks").classList.remove("hidden");
  document.getElementById("resultSection").classList.remove("hidden");
  document.getElementById("retryBtn").classList.add("hidden");

  document.getElementById("finalTitle").innerText = "📊 진행 중...";

  const totalRounds = parseInt(document.getElementById("roundInput").value);

  winCount = {};
  players.forEach(p => winCount[p]=0);

  for(let round=1; round<=totalRounds; round++){
    let winner;

    if(round % 10 === 0){
      winner = await runAnimatedRace();
      await sleep(50);
    } else {
      winner = runFastRace();
    }

    winCount[winner]++;

    if(round % 10 === 0){
      updateStackUI();
    }
  }

  updateStackUI();
  showFinalResult();
}

function updateStackUI(){
  const sorted = Object.entries(winCount).sort((a,b)=>b[1]-a[1]);

  let html = '<div class="cards">';

  sorted.forEach(([name,count], idx)=>{
    let cls = "card";
    let icon = "🎮";

    if(idx===0){ cls += " top1"; icon = "🥇"; }
    else if(idx===1){ cls += " top2"; icon = "🥈"; }
    else if(idx===2){ cls += " top3"; icon = "🥉"; }

    const blockCount = Math.floor(count / 10);

    let blocks = '';
    for(let i=0;i<blockCount;i++){
      blocks += '<div class="block"></div>';
    }

    html += `
      <div class="${cls}">
        <div>${icon} ${name}</div>
        <div>${count}승</div>
        <div class="stack">${blocks}</div>
      </div>
    `;
  });

  html += '</div>';

  document.getElementById("result").innerHTML = html;
}

function showFinalResult(){
  const sorted = Object.entries(winCount).sort((a,b)=>b[1]-a[1]);
  const winner = sorted[0][0];

  document.getElementById("finalTitle").innerText = `🏆 최종 우승: ${winner}`;
  document.getElementById("retryBtn").classList.remove("hidden");

  showCelebration(winner);
}

function showCelebration(name){
  const box = document.getElementById("celebration");
  const text = document.getElementById("celebrationText");

  text.innerText = `🎉 ${name} 우승!`;
  text.style.animation = "popText 0.6s ease";

  box.classList.remove("hidden");

  for(let i=0;i<40;i++){
    const f = document.createElement("div");
    f.className = "firework";
    f.style.left = "50%";
    f.style.top = "50%";

    const angle = Math.random()*2*Math.PI;
    const distance = Math.random()*200;

    f.style.setProperty("--x", Math.cos(angle)*distance+"px");
    f.style.setProperty("--y", Math.sin(angle)*distance+"px");

    box.appendChild(f);

    setTimeout(()=>f.remove(),800);
  }

  setTimeout(()=>{
    box.classList.add("hidden");
  },800);
}

function goHome(){
  document.getElementById("celebration").classList.add("hidden");
  document.getElementById("celebrationText").innerText = "";
  document.getElementById("result").innerHTML = "";
  document.getElementById("finalTitle").innerText = "📊 진행 중...";
  document.getElementById("resultSection").classList.add("hidden");
  document.getElementById("tracks").classList.add("hidden");
  document.getElementById("startScreen").classList.remove("hidden");
}
</script>

</body>
</html>
